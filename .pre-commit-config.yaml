repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: secret-scan
        name: scan for OpenRouter/Anthropic/Langfuse API keys
        language: pygrep
        entry: "sk-or-v1-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|pk-lf-[A-Za-z0-9_-]{20,}|sk-lf-[A-Za-z0-9_-]{20,}"
        types: [text]
        exclude: '^(\.env\.example|CLAUDE\.md|docs/.*|README\.md)$'
